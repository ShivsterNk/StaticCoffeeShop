<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Thank You - Shivster's Koffee Spot</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                background: #fffaf3;
                color: #3b2f2b;
                padding: 2em;
                text-align: center;
            }
            .submission-card {
                background: #f3e5ab;
                border-radius: 10px;
                padding: 1em;
                max-width: 500px;
                width: 90%;
                margin: 2em auto;
                white-space: pre-wrap;
                text-align: left;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            }
            a {
                color: #6f4e37;
                text-decoration: none;
                font-weight: bold;
            }
            a:hover {
                text-decoration: underline;
            }

        </style>
    </head>

    <body>
        <h2>Thank you, <span id="name"></span>!</h2>
        <p>Your message has been received and sent to: Shivster@koffeeco.com</p>
        <p>NO REAL EMAIL WAS SENT</p>

        <div class="submission-card">
            <strong>Your Submission:</strong><br>
            <strong>Subject: <span id="subject"></span></strong><br><br>
            <span id="message"></span>
        </div>

        <script>
            const params = new URLSearchParams(window.location.search);

            document.getElementById("name").textContent = params.get("name") || "Guest";
            document.getElementById("subject").textContent = params.get("subject") || "(No subject)";
            document.getElementById("message").textContent = params.get("message") || "(No message)";

        </script>
        
    </body>
</html>
